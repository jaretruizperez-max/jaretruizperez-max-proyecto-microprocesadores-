<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <title>Dr. MAscotas</title>

    {% load static %}

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            position: relative;
        }

        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("{% static 'app_veterinaria/img/fondo.jpg' %}") no-repeat center center;
            background-size: cover;
            filter: blur(6px);
            opacity: 0.8;
            z-index: -1;
        }

        .main-container {
            width: 95%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        .main-header {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-top: 10px;
        }

        .header-left, .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-placeholder {
            font-weight: bold;
            font-size: 1.4rem;
            color: #3e5a75;
        }

        .top-nav a {
            text-decoration: none;
            color: #666;
            font-size: 0.9rem;
        }

        .content-wrapper {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .titles-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .titles-section h1 {
            font-weight: bold;
            font-size: 1.8rem;
            color: #2c3e50;
        }

        .login-card {
            background-color: #fff;
            width: 90%;
            max-width: 800px;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .login-card-content {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .illustration-side {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .cat-illustration-placeholder {
            width: 250px;
            height: 250px;
            overflow: hidden;
        }

        .cat-illustration-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .form-side {
            flex: 1.2;
        }

        .input-group { margin-bottom: 20px; }

        .input-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }

        .material-symbols-outlined {
            font-size: 25px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .action-buttons-container {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-login-unified {
            flex: 1;
            padding: 15px;
            background-color: #3e5a75;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-register-guided {
            flex: 1;
            padding: 15px;
            background-color: #eee;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
        }

        .card-footer-text {
            text-align: center;
            margin-top: 25px;
        }
    </style>
</head>

<body>

<div class="background-overlay"></div>

<div class="main-container">

<header class="main-header">
    <div class="header-left">
        <div class="logo-placeholder">Dr. Mascotas</div>
        <nav class="top-nav">
            <a href="{% url 'index' %}">Regresar</a>
        </nav>
    </div>
</header>

<main class="content-wrapper">

<section class="titles-section">
    <h1>Regístrate o Inicia Sesión</h1>
</section>

<div class="login-card">
<div class="login-card-content">

<div class="illustration-side">
    <div class="cat-illustration-placeholder">
        <img src="{% static 'app_veterinaria/img/gato.jpg' %}" alt="Gato">
    </div>
</div>

<div class="form-side">

    <!-- 🔥 MENSAJE DE ERROR -->
    {% if error %}
        <p style="color:red; text-align:center;">
            {{ error }}
        </p>
    {% endif %}

    <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}

        <div class="input-group">
            <label>
                <span class="material-symbols-outlined">person</span>
                Correo
            </label>
            <input type="email" name="correo" required>
        </div>

        <div class="input-group">
            <label>
                <span class="material-symbols-outlined">lock</span>
                Contraseña
            </label>
            <input type="password" name="contrasena" required>
        </div>

        <div class="action-buttons-container">
            <button type="submit" class="btn-login-unified">
                INICIAR SESIÓN
            </button>

            <button type="button"
            onclick="window.location.href='{% url 'registro' %}'"
            class="btn-register-guided">
                REGISTRARSE
            </button>
        </div>

    </form>

</div>
</div>


</div>
</main>
</div>

</body>
</html>
